name: Cleanup PR Screenshots

on:
  pull_request_target:
    types: [closed]

jobs:
  cleanup:
    name: Delete GCS screenshot folder for closed PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.DEPLOYER_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Delete PR screenshot folder
        run: |
          gsutil -m rm -r "gs://het-pr-screenshots/pr-${{ github.event.pull_request.number }}/" || true

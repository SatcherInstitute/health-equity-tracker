name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'data_server/**'
      - 'server/**'
      - 'python/**'
      - 'exporter/**'
      - 'run_**/**'
      - 'shared_requirements/**'

jobs:
  validate_and_test:
    name: Validate & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            python
            data
            data_server
            server
            exporter
            run_ingestion
            run_gcs_to_bq
            shared_requirements
            requirements
            .github

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: data_server/go.mod

      - name: Run Go tests (data_server)
        working-directory: data_server
        run: go test ./...

      - name: Run Go tests (server)
        working-directory: server
        run: go test ./...

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install mypy pytest pytest-xdist types-requests types-PyYAML types-setuptools

          pip install -r requirements/tests.txt
          pip install -r run_ingestion/requirements.txt
          pip install -r run_gcs_to_bq/requirements.txt
          pip install -r exporter/requirements.txt

          # Using -e (editable) ensures Mypy scans the source code
          pip install -e python/ingestion -e python/data_server -e python/datasources

      - name: Run Mypy
        run: |
          mypy --install-types --non-interactive \
            --ignore-missing-imports --show-error-codes \
            --config-file=.github/linters/mypy.ini \
            python/

          mypy --install-types --non-interactive \
            --ignore-missing-imports --show-error-codes \
            --config-file=.github/linters/mypy.ini \
            run_ingestion/

          mypy --install-types --non-interactive \
            --ignore-missing-imports --show-error-codes \
            --config-file=.github/linters/mypy.ini \
            run_gcs_to_bq/

          mypy --install-types --non-interactive \
            --ignore-missing-imports --show-error-codes \
            --config-file=.github/linters/mypy.ini \
            exporter/

      - name: Run Pytest
        run: |
          pytest python/
          pytest exporter/
          pytest run_gcs_to_bq/
          pytest run_ingestion/
name: RUN Frontend Tests

env:
  NETLIFY_SITE_NAME: 'health-equity-tracker'
  GITHUB_PR_NUMBER: ${{github.event.pull_request.number}}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

defaults:
  run:
    working-directory: frontend

jobs:
  validate:
    name: Lint, Unit Tests & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # --- SETUP PHASE ---

      # 1. Fast Checkout
      - name: Checkout
        uses: actions/checkout@v6

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Install Dependencies
      - name: Install dependencies
        run: npm ci

      # --- CODE QUALITY PHASE (Fails Fast) ---

      # 4. Lint
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.2.5
      - name: Run Biome
        run: biome ci src/

      # 5. Unit Tests
      - name: Run Vitest unit tests
        run: npm test

      # 6. Build Check
      - name: Build React frontend
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          VITE_NODE_OPTIONS: '--max_old_space_size=4096'
        run: npx tsc --noEmit && npm run build:deploy_preview

  e2e:
    name: E2E (shard ${{ matrix.shard }}/3)
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      # --- SETUP PHASE ---

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # --- WAIT FOR NETLIFY ---

      - name: Waiting for "Success" from Netlify Preview
        uses: Wandalen/wretry.action@master
        with:
          action: jakepartusch/wait-for-netlify-action@v1.4
          attempt_limit: 3
          attempt_delay: 10000
          with: |
            site_name: ${{env.NETLIFY_SITE_NAME}}
            max_timeout: 180

      # --- PLAYWRIGHT SETUP (Cached) ---

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # --- E2E PHASE ---

      - name: Run E2E shard ${{ matrix.shard }}/3
        run: npx playwright test --project=E2E_CI --workers 2 --shard=${{ matrix.shard }}/3
        env:
          E2E_BASE_URL: 'https://deploy-preview-${{env.GITHUB_PR_NUMBER}}--${{env.NETLIFY_SITE_NAME}}.netlify.app'

      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report/
          retention-days: 30
